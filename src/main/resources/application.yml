spring:
  application:
    name: java-mr-rag

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /docs
    disable-swagger-default-url: true
  api-docs:
    path: /docs/api-docs

app:
  gitlab:
    url: ${GITLAB_URL:https://gitlab.com}
    token: ${GITLAB_TOKEN:}
  workspace:
    dir: ${WORKSPACE_DIR:workspace}
  graph:
    cache:
      serialization-enabled: true
      sources-jars-enabled: true
      sources-remote-enabled: true
      sources-remote-cache-dir: ${app.workspace.dir}/mrrag-sources-cache
      dir: ${app.workspace.dir}/graph-cache
  enrichment:
    # How many lines around a change to include as context
    surroundingLines: 3
    # Max enrichment snippets per change group
    maxSnippetsPerGroup: 10
    # Max lines per snippet
    maxSnippetLines: 30

graph:
  edge:
    # Structural
    DECLARES:
      enabled: true
    # Type hierarchy
    EXTENDS:
      enabled: true
    IMPLEMENTS:
      enabled: true
    # Invocations
    INVOKES:
      enabled: true
    INSTANTIATES:
      enabled: true
    INSTANTIATES_ANONYMOUS:
      enabled: true
    REFERENCES_METHOD:
      enabled: true
    # Field access
    READS_FIELD:
      enabled: true
    WRITES_FIELD:
      enabled: true
    # Local variables (can be noisy on large projects — disable if needed)
    READS_LOCAL_VAR:
      enabled: false
    WRITES_LOCAL_VAR:
      enabled: false
    # Exceptions
    THROWS:
      enabled: true
    # Annotations
    ANNOTATED_WITH:
      enabled: true
    # Type references (Foo.class, instanceof, cast)
    REFERENCES_TYPE:
      enabled: true
    # Overrides
    OVERRIDES:
      enabled: true

logging:
  level:
    com.example: DEBUG
    spoon.support.compiler.jdt: WARN
