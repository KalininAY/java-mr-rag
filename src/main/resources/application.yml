spring:
  application:
    name: java-mr-rag
  main:
    web-application-type: reactive
  ai:
    mcp:
      server:
        enabled: true
        name: mr-rag-mcp
        version: 0.1.0
        transport: SSE
        sse-message-endpoint: /mcp/messages

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /docs
    disable-swagger-default-url: true
  api-docs:
    path: /docs/api-docs

app:
  gitlab:
    url: ${GITLAB_URL:https://gitlab.com}
    token: ${GITLAB_TOKEN:}
  workspace:
    dir: ${WORKSPACE_DIR:workspace}
  graph:
    cache:
      serialization-enabled: true
      sources-jars-enabled: true
      sources-remote-enabled: true
      sources-remote-cache-dir: ${app.workspace.dir}/mrrag-sources-cache
      dir: ${app.workspace.dir}/graph-cache
  enrichment:
    surroundingLines: 3
    maxSnippetsPerNode: 3
    maxSnippetLines: 30
    maxCallersPerNode: 5
    callerWindowLines: 5

graph:
  edge:
    DECLARES:
      enabled: true
    EXTENDS:
      enabled: true
    IMPLEMENTS:
      enabled: true
    INVOKES:
      enabled: true
    INSTANTIATES:
      enabled: true
    INSTANTIATES_ANONYMOUS:
      enabled: true
    REFERENCES_METHOD:
      enabled: true
    READS_FIELD:
      enabled: true
    WRITES_FIELD:
      enabled: true
    READS_LOCAL_VAR:
      enabled: true
    WRITES_LOCAL_VAR:
      enabled: true
    THROWS:
      enabled: true
    ANNOTATED_WITH:
      enabled: true
    REFERENCES_TYPE:
      enabled: true
    OVERRIDES:
      enabled: true
    IMPORT:
      enabled: false
    HAS_IMPORT:
      enabled: false

logging:
  level:
    com.example: DEBUG
    spoon.support.compiler.jdt: WARN
